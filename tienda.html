<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Muscarina — Tienda</title>

  <!-- GOOGLE FONTS INTER -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #111111;
      color: #000018;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      min-height: 100vh;
    }

    /* ===== LOADER ===== */
    .loader-square-33 {
      display: inline-block;
      outline: 1px solid #000018;
      width: 50px;
      height: 50px;
      overflow: hidden;
      position: relative;
    }

    .loader-square-33::before {
      content: "";
      background: #000018;
      width: 5px;
      height: 53px;
      transform-origin: top center;
      animation: anm-SL-33-move 2.5s infinite linear;
      display: inline-block;
    }

    @keyframes anm-SL-33-move {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(-90deg); margin-left: -5px; margin-top: 0; transform-origin: top center; }
      50% { margin-left: -5px; margin-top: 45px; transform-origin: top center; transform: rotate(-90deg); }
      75% { margin-left: 45px; margin-top: 0; transform-origin: bottom center; transform: rotate(0deg); }
      100% { transform: rotate(0deg); transform-origin: bottom center; margin-left: 0; margin-top: 0; }
    }

    /* ===== CURSOR PERSONALIZADO (SOLO PC) ===== */
    @media (min-width: 769px) {
      /* Ocultar el cursor en TODOS los elementos */
      * {
        cursor: none !important;
      }

      .cursor-loader {
        position: fixed;
        width: 50px;
        height: 50px;
        pointer-events: none;
        transform: translate(-50%, -50%) scale(0.5);
        z-index: 999999;
        transition: transform 0.25s ease;
      }

      .cursor-loader .loader-square-33::before {
        animation-play-state: paused;
      }

      .cursor-loader.activo {
        transform: translate(-50%, -50%) scale(0.7);
      }

      .cursor-loader.activo .loader-square-33::before {
        animation-play-state: running;
      }
    }

    /* ===== NAV ===== */
    nav {
      position: fixed;
      top: 30px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 28px;
      z-index: 100;
    }

    nav a {
      padding: 10px 18px;
      font-size: 13px;
      letter-spacing: 2px;
      font-weight: 400;
      border: 1px solid rgba(0,0,24,0.4);
      color: #000018;
      text-decoration: none;
      background: rgba(255,255,255,0.03);
      transition: all 0.3s ease;
    }

    nav a:hover { 
      background: rgba(255,255,255,0.1);
    }

    /* ===== MAIN ===== */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 140px 20px 80px;
      text-align: center;
    }

    /* ===== TEXTO INTRO ===== */
    .intro {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 80px;
      padding: 32px 38px;
      border: 1px solid rgba(0,0,24,0.4);
      display: inline-block;
      width: auto;
      transition: all 0.3s ease;
    }

    .intro:hover {
      background: rgba(0,0,24,0.02);
    }

    /* ===== CATEGORÍAS ===== */
    .categorias {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 50px;
    }

    .categoria {
      border: 1px solid rgba(0,0,24,0.3);
      padding: 80px 20px;
      text-decoration: none;
      color: #000018;
      transition: all 0.4s ease;
      background: rgba(255,255,255,0.02);
    }

    .categoria:hover {
      border: 1px solid rgba(0,0,24,0.6);
      background: rgba(255,255,255,0.06);
      transform: translateY(-5px);
    }

    .categoria h2 {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 18px;
      letter-spacing: 4px;
      margin-bottom: 15px;
    }

    .categoria p {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 12px;
      opacity: 0.7;
      letter-spacing: 1px;
    }

    /* ===== RESPONSIVE MÓVIL ===== */
    @media (max-width: 768px) {
      nav {
        gap: 20px;
        top: 15px;
      }

      nav a {
        font-size: 11px;
        letter-spacing: 1px;
        padding: 8px 12px;
      }

      main {
        padding: 120px 15px 60px;
      }

      .intro {
        padding: 20px 16px;
        font-size: 12px;
        margin-bottom: 50px;
        width: 100% !important;
      }

      .categorias {
        grid-template-columns: 1fr;
        gap: 30px;
      }

      .categoria {
        padding: 50px 20px;
      }

      .categoria h2 {
        font-size: 16px;
        letter-spacing: 3px;
      }

      .categoria p {
        font-size: 11px;
      }

      footer {
        font-size: 10px;
        padding: 30px 20px;
      }
    }
  </style>

</head>

<body>

  <!-- MENÚ -->
  <nav>
    <a href="index.html">INICIO</a>
    <a href="tienda.html">TIENDA</a>
    <a href="bio.html">PORTFOLIO</a>
  </nav>

  <main>
    <p class="intro">
      Selección de obras y objetos. Cada pieza compone un fragmento del sistema creativo y están realizadas en diferentes momentos de mi carrera.
    </p>

    <section class="categorias">

      <a href="cuadros.html" class="categoria">
        <h2>CUADROS</h2>
        <p>Piezas artísticas · materia · percepción</p>
      </a>

      <a href="objetos.html" class="categoria">
        <h2>OBJETOS</h2>
        <p>Piezas utilitarias · diseño industrial · experimentación</p>
      </a>

    </section>
  </main>

  <!-- CURSOR PERSONALIZADO (SOLO PC) -->
  <div class="cursor-loader" id="cursor">
    <div class="loader-square-33"></div>
  </div>

  <!-- VANTA FOG -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://unpkg.com/vanta@latest/dist/vanta.fog.min.js"></script>
  <script>
    VANTA.FOG({
      el: "body",
      backgroundAlpha: 1.0,
      baseColor: 0xd0ff94,
      highlightColor: 0x83e7ff,
      midtoneColor: 0xe8a0ff,
      lowlightColor: 0x006ee9,
      blurFactor: 0.9,
      speed: 2.8,
      zoom: 1.4,
      scale: 2.0,
      scaleMobile: 4.0,
      mouseControls: true,
      touchControls: true,
      gyroControls: false
    });
  </script>

  <!-- SCRIPT PARA EL CURSOR PERSONALIZADO -->
  <script>
    // === CURSOR PERSONALIZADO (SOLO EN PC) ===
    if (window.innerWidth > 768) {
      const cursor = document.getElementById("cursor");

      document.addEventListener("mousemove", (e) => {
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";
      });

      // Elementos que activan la animación del cursor
      const elementosInteractivos = document.querySelectorAll("a, .intro, .categoria, nav a");
      
      elementosInteractivos.forEach(el => {
        el.addEventListener("mouseenter", () => {
          cursor.classList.add("activo");
        });

        el.addEventListener("mouseleave", () => {
          cursor.classList.remove("activo");
        });
      });
    }
  </script>

</body>
</html>
