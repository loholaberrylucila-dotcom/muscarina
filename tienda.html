<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muscarina — Tienda</title>

  <!-- GOOGLE FONTS INTER (misma que index) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #111111;
      color: #000018;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      min-height: 100vh;
    }

    /* ===== NAV (EXACTAMENTE IGUAL AL INDEX) ===== */
    nav {
      position: fixed;
      top: 30px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 28px;
      z-index: 100;
    }

    nav a {
      padding: 10px 18px;
      font-size: 13px;
      letter-spacing: 2px;
      font-weight: 400;
      border: 1px solid rgba(0,0,24,0.4);
      color: #000018;
      text-decoration: none;
      background: rgba(255,255,255,0.03);

      -webkit-mask: url("https://raw.githubusercontent.com/pizza3/asset/master/natureSmaller.png");
      mask: url("https://raw.githubusercontent.com/pizza3/asset/master/natureSmaller.png");
      -webkit-mask-size: 7100% 100%;
      mask-size: 7100% 100%;

      animation: ani2 0.7s steps(70) forwards;
      transition: all 0.3s ease;
    }

    nav a:hover { 
      animation: ani 0.7s steps(70) forwards;
      background: rgba(255,255,255,0.1);
    }

    /* ===== MÁSCARAS (MISMAS QUE INDEX) ===== */
    @keyframes ani { 
      from { mask-position: 0 0; } 
      to { mask-position: 100% 0; } 
    }
    @keyframes ani2 { 
      from { mask-position: 100% 0; } 
      to { mask-position: 0 0; } 
    }

    /* ===== MAIN ===== */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 140px 20px 80px;
      text-align: center;
    }

    /* ===== TEXTO INTRO (estilo igual a .text-frame del index pero más compacto) ===== */
    .intro {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 80px;
      padding: 32px 38px;
      border: 1px solid rgba(0,0,24,0.4);
      display: inline-block;
      width: auto;
      
      -webkit-mask: url("https://raw.githubusercontent.com/pizza3/asset/master/natureSmaller.png");
      mask: url("https://raw.githubusercontent.com/pizza3/asset/master/natureSmaller.png");
      -webkit-mask-size: 7100% 100%;
      mask-size: 7100% 100%;
      
      animation: ani2 0.7s steps(70) forwards;
    }

    .intro:hover {
      animation: ani 0.7s steps(70) forwards;
    }

    /* ===== CATEGORÍAS ===== */
    .categorias {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 50px;
    }

    .categoria {
      border: 1px solid rgba(0,0,24,0.3);
      padding: 80px 20px;
      text-decoration: none;
      color: #000018;
      transition: all 0.4s ease;
      background: rgba(255,255,255,0.02);
      
      -webkit-mask: url("https://raw.githubusercontent.com/pizza3/asset/master/natureSmaller.png");
      mask: url("https://raw.githubusercontent.com/pizza3/asset/master/natureSmaller.png");
      -webkit-mask-size: 7100% 100%;
      mask-size: 7100% 100%;
      
      animation: ani2 0.7s steps(70) forwards;
    }

    .categoria:hover {
      border: 1px solid rgba(0,0,24,0.6);
      background: rgba(255,255,255,0.06);
      transform: translateY(-5px);
      animation: ani 0.7s steps(70) forwards;
    }

    .categoria h2 {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 18px;
      letter-spacing: 4px;
      margin-bottom: 15px;
    }

    .categoria p {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 12px;
      opacity: 0.7;
      letter-spacing: 1px;
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 40px 20px;
      font-size: 11px;
      opacity: 0.4;
      letter-spacing: 2px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
    }
  </style>
</head>

<body>

  <!-- MENÚ IGUAL AL INDEX -->
  <nav>
    <a href="index.html">INICIO</a>
    <a href="tienda.html">TIENDA</a>
    <a href="bio.html">PORTFOLIO</a>
  </nav>

  <main>
    <p class="intro">
      Selección de obras y objetos.  
      Cada pieza es un fragmento del sistema Muscarina.
    </p>

    <section class="categorias">

      <a href="cuadros.html" class="categoria">
        <h2>CUADROS</h2>
        <p>Obras bidimensionales · materia · percepción</p>
      </a>

      <a href="objetos.html" class="categoria">
        <h2>OBJETOS</h2>
        <p>Piezas utilitarias · diseño · experimentación</p>
      </a>

    </section>
  </main>

  <footer>
    © Muscarina
  </footer>

  <!-- VANTA FOG (EXACTAMENTE IGUAL AL INDEX) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://unpkg.com/vanta@latest/dist/vanta.fog.min.js"></script>
  <script>
    VANTA.FOG({
      el: "body",
      backgroundAlpha: 1.0,
      baseColor: 0xd0ff94,
      highlightColor: 0x83e7ff,
      midtoneColor: 0xe8a0ff,
      lowlightColor: 0x006ee9,
      blurFactor: 0.9,
      speed: 2.8,
      zoom: 1.4,
      scale: 2.0,
      scaleMobile: 4.0,
      mouseControls: true,
      touchControls: true,
      gyroControls: false
    });
  </script>

</body>
</html>
