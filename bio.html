<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portfolio | Muscarina</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0f0f0f;
      color: #f2f2f2;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
    }

    /* ========== HEADER FIJO (EXACTAMENTE COMO EL ORIGINAL) ========== */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px;
      display: flex;
      justify-content: center;
      gap: 40px;
      background: rgba(15, 15, 15, 0.9);
      backdrop-filter: blur(6px);
      z-index: 1000;
    }

    nav a {
      color: #f2f2f2;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: opacity 0.3s;
    }

    nav a:hover {
      opacity: 0.6;
    }

    /* ========== FONDO FIJO CON IMAGEN ========== */
    .fondo-fijo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: -1;
      background-image: url('https://via.placeholder.com/1920x1080/1a1a1a/ffffff?text=TU+IMAGEN+DE+FONDO+AQUI');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* ========== GALERÍA QUE SCROLLEA ========== */
    .portfolio-scroll {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 100px 20px 60px;
    }

    /* Grid de imágenes */
    .grid-imagenes {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 30px;
    }

    /* Cada imagen del portfolio */
    .portfolio-item {
      background: transparent;
      overflow: hidden;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .portfolio-item:hover {
      transform: translateY(-8px);
    }

    .portfolio-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s ease;
    }

    .portfolio-item:hover img {
      transform: scale(1.03);
    }

    /* Pie de página simple */
    footer {
      text-align: center;
      padding: 40px 20px;
      font-size: 11px;
      opacity: 0.4;
      position: relative;
      z-index: 1;
    }

    /* Responsive */
    @media (max-width: 768px) {
      nav {
        gap: 25px;
        padding: 15px;
      }
      
      nav a {
        font-size: 11px;
        letter-spacing: 1.5px;
      }
      
      .grid-imagenes {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      
      .portfolio-scroll {
        padding: 80px 15px 40px;
      }
    }
  </style>
</head>
<body>

  <!-- FONDO FIJO (CAMBIA LA URL DE LA IMAGEN) -->
  <div class="fondo-fijo"></div>

  <!-- MENÚ SUPERIOR (IGUAL AL ORIGINAL) -->
  <nav>
    <a href="index.html">Inicio</a>
    <a href="tienda.html">Tienda</a>
    <a href="bio.html">Portfolio</a>
  </nav>

    <div class="grid-imagenes">
      
      <!-- IMAGEN 1 - REEMPLAZA CON TU PROPIA IMAGEN -->
      <div class="portfolio-item">

      <!-- IMAGEN 5 -->

      <!-- IMAGEN 6 -->

</body>
</html>
